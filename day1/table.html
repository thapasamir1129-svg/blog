<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TABLE</title>
    <style>
        table,
        th,
        td {
            border: 2px solid;
            border-color: collapse;
        }
    </style>
</head>

<body>
    <table>
        <tr>

            <th>header</th>
            <th>header</th>
            <th>header</th>
            <th>header</th>
        </tr>
        <tr>
            <td rowspan="4">row span</td>
            <td colspan="3">span columns</td>
        </tr>
        <tr>
            <td colspan="2">span columns</td>
            <td rowspan="3">span both</td>
        </tr>
        <tr>
            <td rowspan="2">span rows</td>
            <td>span columns</td>
        </tr>
        <tr>
            <td>span both</td>
        </tr>
    </table><br>
    <table>
        <thead>
            <tr>
                <th rowspan="2">Heading</th>
                <th>students</th>
                <th colspan="3">Details</th>
            </tr>
            <tr>
                <th>Id</th>
                <th>Name</th>
                <th>department</th>
                <th>Roll Number</th>
            </tr>
        </thead>
        <tr>
            <td rowspan="4">Student List</td>
            <td>1</td>
            <td>Victor</td>
            <td>computer Science</td>
            <td>12345</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Williams</td>
            <td>Electronics</td>
            <td>23456</td>
        </tr>
        <tr>
            <td>3</td>
            <td>Harry</td>
            <td>Electrical</td>
            <td>34567</td>
        </tr>
        <tr>
            <td>4</td>
            <td>Rick</td>
            <td>Civil</td>
            <td>45678</td>
        </tr>
    </table>
    <table>
        <p>
            <td><b></b></td>
        </p>
    </table>
</body>

</html>
