<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grading system</title>
</head>
<body>
    <script>
       let marks=65;

       if (marks>=80){
        console.log("A");
       }else if  (marks >=60){
        console.log("B");
       }else if  (marks>=40){
        console.log("C");
       }else if (marks>=30){
        console.log("D");
       }else{
        console.log("FAIL");
       } 
    </script>
    
</body>
</html>
